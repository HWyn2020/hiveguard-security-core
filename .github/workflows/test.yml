name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest on Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run the framework test suite
        run: pytest -v --tb=short

      - name: Verify zero runtime dependencies
        shell: bash
        run: |
          python -c "
          import framework.agents.base_agent
          import framework.lifecycle.states
          import framework.security.invariants
          import framework.security.enforcement
          import framework.types
          print('All framework modules import with stdlib only.')
          "

      - name: Verify example agents run
        shell: bash
        run: |
          python -c "
          from examples.echo_agent import EchoAgent
          from examples.monitor_agent import MonitorAgent
          print('Example agents import cleanly.')
          "
